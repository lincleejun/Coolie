name: Desktop UI Nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  desktop-nightly:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:fast
      - run: bun run test:runtime
      - run: bun run test:tauri -- --suite mock
      - run: bun run test:tauri -- --suite real --maxInstances=1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-ui-nightly
          path: |
            packages/client/.wdio-logs/**
            packages/client/test-results/**
          if-no-files-found: ignore
